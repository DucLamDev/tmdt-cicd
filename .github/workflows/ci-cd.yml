name: CI/CD Docker Compose VPS

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.11"

jobs:
  ci:
    name: Test and build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node for backend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Test backend (advisory)
        working-directory: backend
        shell: bash
        env:
          CI_STRICT_BACKEND_TESTS: ${{ vars.CI_STRICT_BACKEND_TESTS }}
        run: |
          set +e
          npm test -- --runInBand
          status=$?

          if [ "$status" -eq 0 ]; then
            echo "Backend tests passed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$CI_STRICT_BACKEND_TESTS" = "true" ]; then
            echo "::error::Backend tests failed and CI_STRICT_BACKEND_TESTS=true."
            exit "$status"
          fi

          echo "::warning::Backend tests failed, but deployment is continuing because CI_STRICT_BACKEND_TESTS is not true."
          {
            echo "### Backend tests"
            echo ""
            echo "Backend tests failed in advisory mode. Deployment continues."
            echo "Set repository variable \`CI_STRICT_BACKEND_TESTS=true\` to make this block deployment."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Setup Node for frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend (advisory)
        working-directory: frontend
        shell: bash
        env:
          CI_STRICT_FRONTEND_TESTS: ${{ vars.CI_STRICT_FRONTEND_TESTS }}
        run: |
          set +e
          CI=true npm test -- --runInBand
          status=$?

          if [ "$status" -eq 0 ]; then
            echo "Frontend tests passed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$CI_STRICT_FRONTEND_TESTS" = "true" ]; then
            echo "::error::Frontend tests failed and CI_STRICT_FRONTEND_TESTS=true."
            exit "$status"
          fi

          echo "::warning::Frontend tests failed, but deployment is continuing because CI_STRICT_FRONTEND_TESTS is not true."
          {
            echo "### Frontend tests"
            echo ""
            echo "Frontend tests failed in advisory mode. Deployment continues."
            echo "Set repository variable \`CI_STRICT_FRONTEND_TESTS=true\` to make this block deployment."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-tryon-service/requirements.txt

      - name: Install AI try-on dependencies
        working-directory: ai-tryon-service
        run: pip install -r requirements.txt

      - name: Check AI try-on syntax
        working-directory: ai-tryon-service
        run: python -m py_compile main.py flask_app.py tryon_core.py

  docker:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name != 'pull_request'

    outputs:
      repository_lower: ${{ steps.images.outputs.repository_lower }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image names
        id: images
        shell: bash
        run: |
          repository_lower="${GITHUB_REPOSITORY,,}"
          echo "repository_lower=${repository_lower}" >> "$GITHUB_OUTPUT"
          echo "backend=${REGISTRY}/${repository_lower}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend=${REGISTRY}/${repository_lower}/frontend" >> "$GITHUB_OUTPUT"
          echo "ai_tryon=${REGISTRY}/${repository_lower}/ai-tryon" >> "$GITHUB_OUTPUT"

      - name: Prepare frontend build arguments
        id: frontend_args
        shell: bash
        env:
          VITE_API_URL_SECRET: ${{ secrets.VITE_API_URL }}
          VITE_AI_TRYON_URL_SECRET: ${{ secrets.VITE_AI_TRYON_URL }}
          VITE_GOOGLE_CLIENT_ID_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY_SECRET: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VPS_HOST_SECRET: ${{ secrets.VPS_HOST }}
        run: |
          api_url="${VITE_API_URL_SECRET}"
          if [ -z "$api_url" ] && [ -n "$VPS_HOST_SECRET" ]; then
            api_url="http://${VPS_HOST_SECRET}"
          fi
          api_url="${api_url%/}"

          ai_tryon_url="${VITE_AI_TRYON_URL_SECRET}"
          if [ -z "$ai_tryon_url" ] && [ -n "$api_url" ]; then
            ai_tryon_url="${api_url}/ai-tryon"
          fi
          ai_tryon_url="${ai_tryon_url%/}"

          echo "api_url=${api_url}" >> "$GITHUB_OUTPUT"
          echo "ai_tryon_url=${ai_tryon_url}" >> "$GITHUB_OUTPUT"
          echo "google_client_id=${VITE_GOOGLE_CLIENT_ID_SECRET}" >> "$GITHUB_OUTPUT"
          echo "stripe_publishable_key=${VITE_STRIPE_PUBLISHABLE_KEY_SECRET}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:latest
            ${{ steps.images.outputs.backend }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ steps.frontend_args.outputs.api_url }}
            VITE_AI_TRYON_URL=${{ steps.frontend_args.outputs.ai_tryon_url }}
            VITE_GOOGLE_CLIENT_ID=${{ steps.frontend_args.outputs.google_client_id }}
            VITE_STRIPE_PUBLISHABLE_KEY=${{ steps.frontend_args.outputs.stripe_publishable_key }}
          tags: |
            ${{ steps.images.outputs.frontend }}:latest
            ${{ steps.images.outputs.frontend }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build and push AI try-on image
        uses: docker/build-push-action@v6
        with:
          context: ./ai-tryon-service
          file: ./ai-tryon-service/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.ai_tryon }}:latest
            ${{ steps.images.outputs.ai_tryon }}:${{ github.sha }}
          cache-from: type=gha,scope=ai-tryon
          cache-to: type=gha,mode=max,scope=ai-tryon

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload compose files
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          test -n "$VPS_USER"
          port="${VPS_PORT:-22}"
          app_dir="${VPS_APP_DIR:-/opt/marketplace}"
          ssh -i ~/.ssh/deploy_key -p "$port" "$VPS_USER@$VPS_HOST" "mkdir -p '$app_dir/deploy'"
          scp -i ~/.ssh/deploy_key -P "$port" docker-compose.yml "$VPS_USER@$VPS_HOST:$app_dir/docker-compose.yml"
          scp -i ~/.ssh/deploy_key -P "$port" deploy/Caddyfile "$VPS_USER@$VPS_HOST:$app_dir/deploy/Caddyfile"
          scp -i ~/.ssh/deploy_key -P "$port" .env.production.example "$VPS_USER@$VPS_HOST:$app_dir/.env.production.example"

      - name: Login to GHCR on VPS
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
            port="${VPS_PORT:-22}"
            printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/deploy_key -p "$port" "$VPS_USER@$VPS_HOST" "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          else
            echo "Skipping VPS GHCR login. This is OK only when GHCR packages are public."
          fi

      - name: Pull and restart services
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          GHCR_REPOSITORY: ${{ needs.docker.outputs.repository_lower }}
        run: |
          port="${VPS_PORT:-22}"
          app_dir="${VPS_APP_DIR:-/opt/marketplace}"
          ssh -i ~/.ssh/deploy_key -p "$port" "$VPS_USER@$VPS_HOST" "APP_DIR='$app_dir' GHCR_REPOSITORY='$GHCR_REPOSITORY' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$APP_DIR"

          if [ ! -f .env ]; then
            echo "Missing $APP_DIR/.env. Copy .env.production.example to .env and fill production values first."
            exit 1
          fi

          set_env_value() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" .env; then
              sed -i "s|^${key}=.*|${key}=${value}|" .env
            else
              printf "\n%s=%s\n" "$key" "$value" >> .env
            fi
          }

          set_env_value BACKEND_IMAGE "ghcr.io/${GHCR_REPOSITORY}/backend:latest"
          set_env_value FRONTEND_IMAGE "ghcr.io/${GHCR_REPOSITORY}/frontend:latest"
          set_env_value AI_TRYON_IMAGE "ghcr.io/${GHCR_REPOSITORY}/ai-tryon:latest"

          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          docker compose ps
          REMOTE
