services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?Set MONGO_INITDB_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?Set MONGO_INITDB_ROOT_PASSWORD in .env}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging

  ai-tryon:
    image: ${AI_TRYON_IMAGE:?Set AI_TRYON_IMAGE in .env}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in .env}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ai_tryon_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE in .env}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL in .env}
      API_URL: ${API_URL:?Set API_URL in .env}
      MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AI_TRYON_SERVICE_URL: http://ai-tryon:8000
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-tryon:
        condition: service_started
    logging: *default-logging

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE in .env}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      ai-tryon:
        condition: service_started
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    logging: *default-logging

volumes:
  mongo_data:
  redis_data:
  backend_uploads:
  backend_logs:
  ai_tryon_uploads:
  caddy_data:
  caddy_config:

